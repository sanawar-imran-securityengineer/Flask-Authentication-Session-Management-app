{% extends "base.html" %}

{% block content %}

<h3>Welcome {{ session.user }}</h3>

<h4>Add Task</h4>
<form method="POST">
    {{ form.hidden_tag() }}
    {{ form.task() }}
    <button type="submit">Add</button>
</form>

<hr>

<h4>Your Tasks</h4>

<ul>
{% for t in tasks %}
    <li>
        {{ t.task }}
        <a href="/delete/{{ t.id }}">Delete</a>
    </li>
{% endfor %}
</ul>

{% endblock %}
