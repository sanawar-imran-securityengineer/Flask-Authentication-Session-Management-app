{% extends "base.html" %}

{% block content %}
<h3>Register</h3>

<form method="POST">
    {{ form.hidden_tag() }}

    <p>Username:</p>
    {{ form.username() }}

    <p>Password:</p>
    {{ form.password() }}

    <br><br>
    <button type="submit">Register</button>
</form>

{% endblock %}
